name: safepath
description: Smart Accessibility and Safety Application for disabled people
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_messaging: ^15.0.1

  # State Management
  provider: ^6.1.2

  # Location & Maps
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Voice / TTS
  flutter_tts: ^4.2.0

  # HTTP & Email
  http: ^1.2.1

  # Storage & Preferences
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2

  # UI Utilities
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.68.0

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.5
  battery_plus: ^6.0.1
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
